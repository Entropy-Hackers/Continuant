# body/dashboard/compose.yaml — TEMPLATE, not meant to be run in place.
#
# One dashboard deployment per Continuant instance, colocated with that
# instance (an instance may live on a different server from any other —
# see backend/main.py's module docstring). Real deployments live as a
# sibling of the instance, e.g. /opt/continuants/instances/CGR-55/dashboard/,
# with `build:` pointing back at this repo directory as the build context.
#
# Reads that instance's own audit/ (ops metrics) and workspace/ (the
# "life" side: MEMORY.md, work/, people/, library/, reflection/) —
# both read-only. Writes exactly one thing: control/command.json — see
# docs/adr/0004 and tools/control-exec/README.md; that directory must be
# rw, everything else stays ro. Never mounts config/ or secrets/. No
# docker.sock access; liveness is inferred from audit-tap freshness, not
# `docker ps`.
#
# db/ is the dashboard's OWN small SQLite state (phase-change history,
# see backend/db.py) — private to this container, not shared with
# anything else, owned by the container's fixed UID (10001).
#
# Optionally join the instance's shared ops_net (see the real deployment
# under /opt/continuants/instances/*/dashboard/ for the pattern) so an
# existing Caddy can reverse_proxy to it for a real public URL — the
# dashboard's own password auth is the access control at that point, not
# network placement. Otherwise reach it via `tailscale serve` on the
# host, on its own HTTPS port (a path under the same origin as another
# app on this host can collide with client-side route capture — give it
# a separate port instead, see README.md).
#
# `name:` is set explicitly — every instance's copy of this file lives in
# a directory literally called `dashboard/`, so Compose's default
# (folder-name-derived) project name would be "dashboard" for every
# single instance. Without this, two instances' dashboards on the same
# host silently fight over one shared network/image namespace.

name: dashboard-INSTANCE_NAME

services:
  dashboard:
    build: .
    container_name: continuant-dashboard-INSTANCE_NAME
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      DASHBOARD_INSTANCE_NAME: INSTANCE_NAME
    env_file:
      - secrets/.env
    volumes:
      - /opt/continuants/instances/INSTANCE_NAME/audit:/data/audit:ro
      - /opt/continuants/instances/INSTANCE_NAME/workspace:/data/workspace:ro
      - /opt/continuants/instances/INSTANCE_NAME/control:/data/control
      - /opt/continuants/instances/INSTANCE_NAME/dashboard/db:/data/db
