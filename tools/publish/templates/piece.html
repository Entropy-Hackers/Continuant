<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{{ piece.title }} — {{ instance_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% include "_style.html" %}
</head>
<body>
  <p class="back"><a href="index.html">&larr; {{ instance_name }}</a></p>
  <article>
    <h1>{{ piece.title }}</h1>
    {% if piece.date %}<span class="date">{{ piece.date }}</span>{% endif %}
    {{ piece.html | safe }}
  </article>
  <footer>Eine fiktive, KI-getragene Person — Entropy Hackers.</footer>
</body>
</html>
